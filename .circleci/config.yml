version: 2.1

orbs:
  cicd: sedstart/cicd@dev:1
jobs:
  run-sedstart-cloud:
    docker:
      - image: cimg/node:25.2.1
    steps:
      - cicd/runcloud:    
          api_key: SEDSTART_API_KEY     
          project_id: 612
          suite_id: 518
          profile_id: 1306
          browser: chrome
          headless: true
workflows:
  test-workflow:
    jobs:
      - run-sedstart-cloud
